// Собираем полную колоду из 78 карт
const DECK = MAJORS.slice();
for (const suit of SUITS) {
  for (let r = 0; r < RANKS.length; r++) {
    DECK.push([RANKS[r], suit.gen, suit.emoji, suit.means[r]]);
  }
}

let lastCard = -1;
function drawCard() {
  let i;
  do { i = Math.floor(Math.random() * DECK.length); }
  while (i === lastCard && DECK.length > 1);
  lastCard = i;
  return DECK[i];
}

const stage = document.getElementById("stage");
const tarot = document.getElementById("tarot");
const meaning = document.getElementById("meaning");
const go = document.getElementById("go");
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
let busy = false;

// Разлёт искорок вокруг карты
function spawnSparkles() {
  const emojis = ["✨","⭐","💫","🌟"];
  for (let n = 0; n < 14; n++) {
    const s = document.createElement("span");
    s.className = "spark";
    s.textContent = emojis[n % emojis.length];
    const angle = Math.random() * Math.PI * 2;
    const dist = 70 + Math.random() * 70;
    s.style.setProperty("--dx", Math.cos(angle) * dist + "px");
    s.style.setProperty("--dy", Math.sin(angle) * dist + "px");
    s.style.animationDelay = (Math.random() * 0.3) + "s";
    stage.appendChild(s);
    requestAnimationFrame(() => s.classList.add("go"));
    setTimeout(() => s.remove(), 1400);
  }
}

function reveal() {

  busy = true;
  go.disabled = true;

  // 1. Прячем прошлый результат
  meaning.classList.remove("show");
  tarot.classList.remove("placeholder", "reveal", "show");

  // 2. Магия: рубашка дрожит и светится + искры
  tarot.classList.add("shuffling");
  tarot.innerHTML = '<div class="back"><div class="back-glyph">✦</div></div>';
  spawnSparkles();

  const wait = reduceMotion ? 150 : 1100;

  // 3. Переворот и показ карты
  setTimeout(() => {
    const [num, name, symbol, text] = drawCard();
    tarot.classList.remove("shuffling");
    tarot.classList.add("reveal");
    tarot.innerHTML =
      '<div class="num">' + num + '</div>' +
      '<div class="symbol">' + symbol + '</div>' +
      '<div class="cname">' + name + '</div>';
    meaning.textContent = text;
    requestAnimationFrame(() => {
      tarot.classList.add("show");
      meaning.classList.add("show");
    });
    go.disabled = false;
    busy = false;
  }, wait);
}

// Дата (обновляется, если страница открыта со вчера)
function showDate() {
  document.getElementById("date").textContent =
    new Date().toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });
}
showDate();
setInterval(showDate, 60 * 1000);

go.addEventListener("click", reveal);

// Звёздный фон
const cv = document.getElementById("stars");
const ctx = cv.getContext("2d");
const stars = Array.from({length: 80}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  r: Math.random()*1.5+0.3, a: Math.random()
}));
let animId = null;

function paint(animate){
  ctx.clearRect(0,0,cv.width,cv.height);
  for (const s of stars){
    if (animate){
      s.a += (Math.random()-0.5)*0.05;
      s.a = Math.max(0.1, Math.min(1, s.a));
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255," + s.a + ")";
    ctx.fill();
  }
}
function animateStars(){
  paint(true);
  animId = requestAnimationFrame(animateStars);
}
function resize(){
  cv.width = innerWidth; cv.height = innerHeight;
  if (reduceMotion) paint(false);
}

resize();
addEventListener("resize", resize);

if (reduceMotion) {
  paint(false);
} else {
  animateStars();
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) cancelAnimationFrame(animId);
    else animateStars();
  });
}
})();
</script>
