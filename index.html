  /* Стили только для страницы «Предсказание» */
  .prediction {

  .prediction.placeholder { opacity: 1; transform: none; color: var(--muted); }

  .stat { flex: 1; background: rgba(0,0,0,0.25); border-radius: 14px; padding: 14px 8px; }
  .stat .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .color-dot {
    display: inline-block; width: 22px; height: 22px; border-radius: 50%;

<script>
(function () {
"use strict";

const PREDICTIONS = [

  "Найдёшь деньги там, где не ждёшь: проверь карман старой куртки или щель в диване.",

  "Тебе вернут давний долг — деньгами или добрым делом. Не отказывайся.",

  "Найдёшь вещь, которую давно считал(а) потерянной. Загляни в нижний ящик.",
  "Сегодня твой день для спонтанности: выйди на одну остановку раньше и прогуляйся.",
  "Кто-то в транспорте уступит тебе место без просьбы. Мир к тебе добр.",
  "Не одалживай деньги сегодня — вернут нескоро. А вот угостить кого-то кофе — самое то.",
  "Вечером тебя ждёт вкусный ужин и неожиданно тёплый разговор.",

  "На работе или учёбе тебя похвалят за то, что ты сам(а) считал(а) мелочью.",
  "Сегодня лучше проверить, взял(а) ли ты ключи. Дважды.",

  "Кто-то поделится с тобой едой на работе. Прими — это знак тёплых отношений.",
  "Сегодня ты наконец ответишь на сообщение, которое откладывал(а) неделями.",

  "Сегодня удачный день для покупки — найдёшь нужное со скидкой.",
  "Подруга расскажет тебе секрет. Будь достоин(йна) доверия.",
  "Сегодня кофемашина на работе будет работать. Это победа.",
  "Берегись скользкого пола в супермаркете — ступай уверенно.",
  "Тебе достанется место у окна. Любуйся городом по дороге.",
  "Сегодня случайный комплимент от незнакомца сделает твой день.",
  "Найдёшь забытую купюру в кошельке. Маленький подарок от прошлого себя.",
  "Сегодня лучше не спорить с водителем маршрутки. Просто доедь спокойно.",
  "Тебя ждёт приятная посылка или доставка. Проверь домофон.",
  "Сегодня ты приготовишь что-то вкусное, даже если не планировал(а).",
  "В очереди перед тобой окажется всего один человек. Везение!",
  "Сегодня старая бабушка в автобусе угостит тебя конфетой. Не отказывайся.",
  "Тебе позвонят с хорошей новостью ближе к вечеру.",
  "Сегодня лучше зарядить телефон с утра — он тебе очень пригодится.",
  "Ты встретишь собаку, которая захочет с тобой подружиться. Улыбнись ей.",
  "Сегодня деньги лучше потратить на впечатления, а не на вещи.",
  "В кафе тебе принесут заказ быстрее обычного. Кухня сегодня на твоей стороне.",
  "Осторожнее с дверями метро — не зевай, заходя в вагон.",
  "Сегодня ты найдёшь решение проблемы, которая мучила тебя неделю.",
  "Подруга предложит прогулку, которая закончится приключением.",
  "Сегодня кто-то придержит тебе дверь. Мелочь, а на душе теплее.",
  "Берегись соблазна купить лишнее — кошелёк скажет спасибо завтра.",
  "Сегодня ты услышишь песню из детства в самом неожиданном месте.",
  "Тебе достанется кусок торта побольше. Судьба знает, что делает.",
  "Сегодня лучше выйти из дома на пять минут раньше. Поверь.",
  "Незнакомец подскажет тебе верную дорогу как раз вовремя.",
  "Сегодня ты помиришься с тем, с кем был(а) в ссоре. Сделай первый шаг.",
  "В метро освободится место прямо напротив тебя. Садись смело.",
  "Сегодня кофе с собой будет бесплатным по акции. Лови момент.",
  "Берегись луж после дождя — обуй то, что не жалко.",
  "Тебе сегодня улыбнётся ребёнок в транспорте. День станет добрее.",
  "Сегодня ты наконец доделаешь то, что откладывал(а). Гордись собой.",
  "Подруга вернёт тебе вещь, которую ты давно ей одолжил(а).",
  "Сегодня в магазине тебе помогут донести тяжёлые пакеты.",
  "Берегись бабушки с тележкой в очереди — пропусти, и день пройдёт мирно.",
  "Сегодня ты найдёшь короткую дорогу и сэкономишь кучу времени.",
  "Тебе перепадёт неожиданная премия или бонус. Звёзды щедры.",
  "Сегодня лучше не отвечать на спорные сообщения сгоряча. Подыши.",
  "Ты выпьешь идеальный кофе ровно нужной температуры. Совершенство дня.",
  "Сегодня случайная встреча на остановке перерастёт в приятное знакомство.",
  "Берегись забытого зонта — привяжи его к сумке мысленно.",
  "Сегодня тебе вернут больше, чем ты ожидал(а). И деньгами, и вниманием.",
  "Подруга расскажет анекдот, от которого ты будешь смеяться весь день.",
  "Сегодня кот или собака выберут именно твои колени. Большая честь.",
  "В метро ты найдёшь свободную розетку как раз когда сядет телефон.",
  "Сегодня лучше перепроверить, выключил(а) ли ты утюг и плиту.",
  "Тебе достанется счастливый билетик. Загадай желание.",
  "Сегодня ты случайно сделаешь чей-то день добрым словом.",
  "Берегись горячих споров в чате — лучше промолчать и выпить чаю.",
  "Сегодня ты найдёшь в кармане деньги, о которых совсем забыл(а).",
  "Подруга позовёт на кофе, и за разговором решится твоя давняя дилемма.",
  "Сегодня бабушка на остановке скажет тебе комплимент. Прими с теплом.",
  "День завершится спокойно и уютно — именно так, как тебе сейчас нужно.",
  "Сегодня ты случайно найдёшь повод улыбнуться там, где совсем не ждал(а)."
];
const MOODS = ["😊","😎","🌟","🔥","🌈","💪","🧘","🍀"];
const COLORS = [
  ["Голубой","#2A9FFF"],["Бирюзовый","#3ad6c5"],["Коралловый","#ff7a6b"],
  ["Лиловый","#b98bff"],["Изумрудный","#3ad67a"],["Золотой","#ffd86b"],
  ["Розовый","#ff8fcf"],["Янтарный","#ffae42"]
];

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// Выбор случайного предсказания, но не такого же, как предыдущее
let lastPrediction = -1;
function nextPrediction() {
  let i;
  do { i = Math.floor(Math.random() * PREDICTIONS.length); }
  while (i === lastPrediction && PREDICTIONS.length > 1);
  lastPrediction = i;
  return PREDICTIONS[i];
}

function generate() {
  const p = document.getElementById("prediction");
  p.classList.remove("show", "placeholder");
  setTimeout(() => {
    p.textContent = nextPrediction();
    p.classList.add("show");
    document.getElementById("luckyNum").textContent = Math.floor(Math.random()*9)+1;
    document.getElementById("mood").textContent = rnd(MOODS);
    const c = rnd(COLORS);
    const dot = document.getElementById("luckyColor");
    dot.style.background = c[1];
    document.getElementById("luckyColorName").textContent = c[0];
  }, 150);
}

// Показ даты (обновляется, если страница открыта со вчера)
function showDate() {
  document.getElementById("date").textContent =
    new Date().toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });
}
showDate();
setInterval(showDate, 60 * 1000);

document.getElementById("go").addEventListener("click", generate);
})();
</script>
