<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Предсказание на день</title>
<style>
  :root {
    --accent: #2A9FFF;
    --bg1: #0a1830;
    --bg2: #102a52;
    --card: rgba(255, 255, 255, 0.08);
    --text: #eef4ff;
    --muted: #9db8e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--text);
    background: radial-gradient(circle at 25% 15%, var(--bg2), var(--bg1));
    overflow-x: hidden;
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    background: var(--card);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 36px 30px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .date { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .prediction {
    font-size: 1.25rem; line-height: 1.55; min-height: 96px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; font-weight: 500;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .prediction.show { opacity: 1; transform: translateY(0); }
  .stats { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat { flex: 1; background: rgba(0,0,0,0.25); border-radius: 14px; padding: 14px 8px; }
  .stat .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .color-dot {
    display: inline-block; width: 22px; height: 22px; border-radius: 50%;
    margin-top: 6px; border: 2px solid rgba(255,255,255,0.5);
  }
  button {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    background: var(--accent); color: #fff; font-size: 1.05rem; font-weight: 700;
    cursor: pointer; transition: transform 0.1s, filter 0.2s;
  }
  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(0.98); }
  .hint { color: var(--muted); font-size: 0.75rem; margin-top: 14px; }
</style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <div class="card">
    <h1>🔮 Предсказание на день</h1>
    <div class="date" id="date"></div>
    <div class="prediction" id="prediction">Нажми кнопку, чтобы узнать своё предсказание ✨</div>
    <div class="stats">
      <div class="stat">
        <div class="label">Число дня</div>
        <div class="value" id="luckyNum">—</div>
      </div>
      <div class="stat">
        <div class="label">Цвет дня</div>
        <div class="value"><span class="color-dot" id="luckyColor"></span></div>
      </div>
      <div class="stat">
        <div class="label">Настрой</div>
        <div class="value" id="mood" style="font-size:1.5rem">—</div>
      </div>
    </div>
    <button id="go">Узнать предсказание</button>
    <div class="hint">Нажимай сколько хочешь — каждый раз новое ✨</div>
  </div>

<script>
const PREDICTIONS = [
  "Сегодня удача на твоей стороне — действуй смелее, чем обычно.",
  "День принесёт неожиданную, но приятную новость. Будь открыт.",
  "Хорошее время начать то, что давно откладывал.",
  "Доверься интуиции — сегодня она не подведёт.",
  "Кто-то из близких порадует тебя. Ответь тем же.",
  "Маленький шаг сегодня превратится в большой результат завтра.",
  "Сегодня стоит отдохнуть и набраться сил — это тоже движение вперёд.",
  "Твоя идея найдёт поддержку. Не бойся её озвучить.",
  "День удачен для разговоров — скажи то, что давно хотел.",
  "Сосредоточься на одном деле — и оно получится блестяще.",
  "Сегодня тебя ждёт приятная случайность. Замечай детали.",
  "Время отпустить старое, чтобы освободить место новому.",
  "Твоё спокойствие сегодня — твоя суперсила.",
  "Удачный день для денег: считай внимательнее обычного.",
  "Сделай сегодня что-то доброе — оно вернётся вдвойне."
];
const MOODS = ["😊","😎","🌟","🔥","🌈","💪","🧘","🍀"];
const COLORS = [
  ["Голубой","#2A9FFF"],["Бирюзовый","#3ad6c5"],["Коралловый","#ff7a6b"],
  ["Лиловый","#b98bff"],["Изумрудный","#3ad67a"],["Золотой","#ffd86b"],
  ["Розовый","#ff8fcf"],["Янтарный","#ffae42"]
];

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generate() {
  const p = document.getElementById("prediction");
  p.classList.remove("show");
  setTimeout(() => {
    p.textContent = rnd(PREDICTIONS);
    p.classList.add("show");
    document.getElementById("luckyNum").textContent = Math.floor(Math.random()*9)+1;
    document.getElementById("mood").textContent = rnd(MOODS);
    const c = rnd(COLORS);
    const dot = document.getElementById("luckyColor");
    dot.style.background = c[1];
    dot.title = c[0];
  }, 150);
}

const d = new Date();
document.getElementById("date").textContent =
  d.toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });

document.getElementById("go").addEventListener("click", generate);

// Звёздный фон
const cv = document.getElementById("stars");
const ctx = cv.getContext("2d");
function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
resize(); addEventListener("resize", resize);
const stars = Array.from({length: 80}, () => ({
  x: Math.random()*cv.width, y: Math.random()*cv.height,
  r: Math.random()*1.5+0.3, a: Math.random()
}));
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for (const s of stars){
    s.a += (Math.random()-0.5)*0.05;
    s.a = Math.max(0.1, Math.min(1, s.a));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255," + s.a + ")";
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
